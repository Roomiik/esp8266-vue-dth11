<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8"/>
<title>Моніторинг DHT11</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<style>
body{font-family:system-ui,sans-serif;margin:20px;color:#1f2937}
.wrap{max-width:900px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0}
.card{border:1px solid #e5e7eb;border-radius:10px;padding:14px;background:#fff}
.metric{font-size:32px;font-weight:600}
.muted{color:#6b7280;font-size:14px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button{padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;background:#f9fafb;cursor:pointer}
button:hover{background:#f3f4f6}
canvas{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.ok{background:#10b981}
.warn{background:#f59e0b}
.err{background:#ef4444}
</style>
</head>

<body>

<div id="app" class="wrap">

<div class="header">
<h1>Моніторинг DHT11</h1>

<div class="row">
<span :class="['status-dot', statusClass]"></span>
<span class="muted">{{ statusText }}</span>
<button @click="manualRefresh">Оновити зараз</button>
</div>
</div>

<div class="cards">

<div class="card">
<div class="muted">Температура</div>
<div class="metric">{{ latest.temperature ?? '---' }} °C</div>
</div>

<div class="card">
<div class="muted">Вологість</div>
<div class="metric">{{ latest.humidity ?? '---' }} %</div>
</div>

<div class="card">
<div class="muted">Тиск</div>
<div class="metric">{{ latest.HPA ?? '---' }} HPA</div>
</div>

<div class="card">
<div class="muted">Останнє оновлення</div>
<div>{{ lastUpdateText }}</div>
</div>

<div class="card">
<div class="muted">Інтервал опитування</div>
<div class="row">
<button @click="setIntervalMs(2000)">2s</button>
<button @click="setIntervalMs(5000)">5s</button>
<button @click="setIntervalMs(10000)">10s</button>
<span class="muted">Поточний: {{ pollMs / 1000 }} s</span>
</div>
</div>

</div>

<h3>Графік температури та вологості</h3>
<canvas id="chart" height="120"></canvas>

</div>

<!-- Vue -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>

const { createApp, ref, computed, onMounted, onBeforeUnmount } = Vue;

createApp({

setup(){

const latest = ref({temperature:null,humidity:null,HPA:null,ts:null})
const history = ref([])

const pollMs = ref(5000)
const status = ref('idle')

let timer = null
let chart = null


const statusClass = computed(()=>{
if(status.value==='ok') return 'ok'
if(status.value==='warn') return 'warn'
if(status.value==='err') return 'err'
return 'warn'
})

const statusText = computed(()=>{
switch(status.value){
case 'ok': return 'Зв’язок у нормі'
case 'warn': return 'Очікування даних'
case 'err': return 'Немає зв’язку з сервером'
default: return 'Ініціалізація'
}
})

const lastUpdateText = computed(()=>{
if(!latest.value?.ts) return '---'
return new Date(latest.value.ts).toLocaleString()
})


function setIntervalMs(ms){
pollMs.value = ms
startPolling()
}


async function fetchLatest(){

try{

const res = await fetch('https://esp8266-dht11.onrender.com/api/latest',{cache:'no-store'})

if(!res.ok) throw new Error()

const data = await res.json()

latest.value = data
status.value = data?.ts ? 'ok' : 'warn'

}
catch(e){

status.value = 'err'
console.error(e)

}

}


async function fetchHistory(){

try{

const res = await fetch('https://esp8266-dht11.onrender.com/api/history?limit=300',{cache:'no-store'})

if(!res.ok) throw new Error()

const data = await res.json()

history.value = Array.isArray(data) ? data : []

upsertChart()

}
catch(e){

console.error(e)

}

}



function startPolling(){

if(timer) clearInterval(timer)

fetchLatest()
fetchHistory()

timer = setInterval(async()=>{

await fetchLatest()
await fetchHistory()

},pollMs.value)

}



function upsertChart(){

const ctx = document.getElementById('chart')

const labels = history.value.map(p=>new Date(p.ts).toLocaleTimeString())
const temps = history.value.map(p=>p.temperature)
const hums = history.value.map(p=>p.humidity)

const dsTemp={
label:'Температура (°C)',
data:temps,
borderColor:'#ef4444',
backgroundColor:'rgba(239,68,68,0.15)',
fill:true,
tension:0.25,
yAxisID:'y1'
}

const dsHum={
label:'Вологість (%)',
data:hums,
borderColor:'#3b82f6',
backgroundColor:'rgba(59,130,246,0.15)',
fill:true,
tension:0.25,
yAxisID:'y2'
}


if(!chart){

chart = new Chart(ctx,{
type:'line',
data:{labels,datasets:[dsTemp,dsHum]},
options:{
responsive:true,
interaction:{mode:'index',intersect:false},
plugins:{legend:{position:'top'}},
scales:{
y1:{type:'linear',position:'left',title:{display:true,text:'°C'}},
y2:{type:'linear',position:'right',title:{display:true,text:'%'},grid:{drawOnChartArea:false}}
}
}
})

}
else{

chart.data.labels = labels
chart.data.datasets[0].data = temps
chart.data.datasets[1].data = hums

chart.update('none')

}

}



function manualRefresh(){

fetchLatest()
fetchHistory()

}



onMounted(()=>{

startPolling()

})



onBeforeUnmount(()=>{

if(timer) clearInterval(timer)
if(chart) chart.destroy()

})


return{
latest,
history,
pollMs,
statusClass,
statusText,
lastUpdateText,
manualRefresh,
setIntervalMs
}

}

}).mount('#app')

</script>

</body>
</html>
